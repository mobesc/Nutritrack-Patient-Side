<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack PH - Patient Profile</title>
    <link rel="stylesheet" href="css/patient-mobile.css">
</head>
<body class="mobile-app" data-page="patient-profile">
    <div class="mobile-shell">
        <div class="mobile-header">
            <div class="greeting-block">
                <small>Account settings</small>
                <h2>My Profile</h2>
            </div>
            <div class="avatar-chip" data-patient-initials>AD</div>
        </div>

        <div class="profile-card">
            <div class="profile-meta">
                <div class="avatar-chip" data-patient-initials>AD</div>
                <div class="profile-meta-text">
                    <h3 data-patient-name>Ana Dela Cruz</h3>
                    <p>Patient ID: <span data-patient-id>PT-2026-001</span></p>
                </div>
            </div>

            <div id="profileNotice" class="notice-bar info">Update the patient profile here. The mobile records view uses this information.</div>

            <form id="profileForm" class="form-stack">
                <div class="input-group">
                    <label for="profileFullName">Full Name</label>
                    <input type="text" id="profileFullName" required>
                </div>

                <div class="field-row">
                    <div class="input-group">
                        <label for="profileEmail">Email</label>
                        <input type="email" id="profileEmail" required>
                    </div>
                    <div class="input-group">
                        <label for="profilePhone">Phone</label>
                        <input type="text" id="profilePhone" required>
                    </div>
                </div>

                <div class="field-row">
                    <div class="input-group">
                        <label for="profileBirthday">Birthday</label>
                        <input type="date" id="profileBirthday" required>
                    </div>
                    <div class="input-group">
                        <label for="profileBloodType">Blood Type</label>
                        <select id="profileBloodType" required>
                            <option value="">Select</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="profileAddress">Address</label>
                    <textarea id="profileAddress" required></textarea>
                </div>

                <div class="field-row">
                    <div class="input-group">
                        <label for="profileEmergency">Emergency Contact</label>
                        <input type="text" id="profileEmergency" required>
                    </div>
                    <div class="input-group">
                        <label for="profilePhilhealth">PhilHealth No.</label>
                        <input type="text" id="profilePhilhealth">
                    </div>
                </div>

                <div class="input-group">
                    <label for="profileAllergies">Allergies / Notes</label>
                    <textarea id="profileAllergies"></textarea>
                </div>

                <div class="inline-actions">
                    <button type="submit" class="primary-btn">Save Profile</button>
                    <button type="button" id="logoutButton" class="secondary-btn">Logout</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="patient-home.html" data-page="patient-home"><span class="nav-icon">🏠</span><span>Home</span></a>
        <a href="patient-appointments.html" data-page="patient-appointments"><span class="nav-icon">📅</span><span>Appointments</span></a>
        <a href="patient-records.html" data-page="patient-records"><span class="nav-icon">📋</span><span>Records</span></a>
        <a href="patient-profile.html" data-page="patient-profile"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>

    <script src="js/patient-mobile.js"></script>
</body>
</html>
