<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack PH - Patient Records</title>
    <link rel="stylesheet" href="css/patient-mobile.css">
</head>
<body class="mobile-app" data-page="patient-records">
    <div class="mobile-shell">
        <div class="mobile-header">
            <div class="greeting-block">
                <small>Personal health file</small>
                <h2>Health Records</h2>
            </div>
            <div class="avatar-chip" data-patient-initials>AD</div>
        </div>

        <div class="notice-bar info">This mobile view keeps the patient’s consultation summary, vitals, immunization status, medications, and provider notes in one place.</div>

        <div id="recordsSummary"></div>

        <div class="section-block">
            <div class="section-header"><h3>Latest vitals</h3></div>
            <div id="vitalsList" class="record-list"></div>
        </div>

        <div class="section-block">
            <div class="section-header"><h3>Immunizations</h3></div>
            <div id="immunizationList" class="record-list"></div>
        </div>

        <div class="section-block">
            <div class="section-header"><h3>Medication reminders</h3></div>
            <div id="medicationList" class="record-list"></div>
        </div>

        <div class="section-block">
            <div class="section-header"><h3>Clinical notes</h3></div>
            <div id="notesList" class="record-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="patient-home.html" data-page="patient-home"><span class="nav-icon">🏠</span><span>Home</span></a>
        <a href="patient-appointments.html" data-page="patient-appointments"><span class="nav-icon">📅</span><span>Appointments</span></a>
        <a href="patient-records.html" data-page="patient-records"><span class="nav-icon">📋</span><span>Records</span></a>
        <a href="patient-profile.html" data-page="patient-profile"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>

    <script src="js/patient-mobile.js"></script>
</body>
</html>
